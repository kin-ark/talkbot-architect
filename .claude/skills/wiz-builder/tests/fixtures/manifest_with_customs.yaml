name: "Payment Reminder Demo"
branch: dev
language: IDN

custom_variables:
  - name: CLIENT_NAME
  - name: DUE_AMOUNT

custom_intents:
  - name: AskExtension
    language: IDN
    keywords: ["bisa tunda", "extension"]

canvases:
  - name: "1. Greeting"
    nodes:
      - id: greet-root
        prompt: Greeting
      - id: greet-pitch
        prompt: Pitch
    edges:
      - {from: greet-root, branch: Unclassified, to: greet-pitch}
  - name: "2. Closing"
    nodes:
      - id: close-root
        prompt: Closing
