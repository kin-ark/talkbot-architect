# wiz-checker variable consistency rules
#
# WIZ.AI variable textType convention (clarified by WIZ.AI 2026-05-19):
#   textType = ""        -> custom variable (user-authored)
#   textType non-empty   -> platform-managed system default
#                           (DEFAULT, DATE, EMAIL, PHONE, etc.)
#   textType == None     -> also platform-managed (legacy/transitional)
#
# WIZ202 (declared-but-unused) fires only for CUSTOM variables (textType == "").
# Platform-managed variables are always declared on every dialogue export
# regardless of whether the script author uses them, so unused-by-utterance is
# not a defect.
#
# This file is currently doc-only. The filter logic is in
# scripts/wizcheck/checks/variables.py.
