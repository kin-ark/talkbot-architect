# wiz-checker variable consistency rules
#
# WIZ.AI variableSource convention (clarified in tightening v3 2026-05-21):
#   variableSource = 0 -> user-authored custom variable
#   variableSource = 1 -> platform/system-managed (always shipped regardless
#                         of script usage)
#
# WIZ202 (declared-but-unused) fires only for variableSource == 0.
# textType is NOT used as a filter in v3 — real exports occasionally ship
# system variables with empty textType, which would defeat a textType-based
# filter. variableSource was empirically stable across all three observed
# real samples.
#
# This file is doc-only; the logic lives in scripts/wizcheck/checks/variables.py.
