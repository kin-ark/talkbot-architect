$schema: "http://json-schema.org/draft-07/schema#"
title: "wiz-facts file"
type: object
required: [schema_version, source_manuals, facts]
additionalProperties: false
properties:
  schema_version:
    type: integer
    const: 1
  source_manuals:
    type: object
  facts:
    type: array
    items:
      type: object
      required: [id, value, cite, quote, confidence]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: "^[a-z0-9_]+(\\.[a-z0-9_]+)+$"
        value: {}
        cite:
          type: object
          required: [manual, pages]
          additionalProperties: false
          properties:
            manual:
              type: string
              enum: [product, config]
            pages:
              type: array
              minItems: 1
              items: {type: integer}
        quote:
          type: string
          minLength: 1
        confidence:
          type: string
          enum: [documented, inferred]
        note:
          type: string
