$schema: "http://json-schema.org/draft-07/schema#"
type: object
required: [input, mods, output]
additionalProperties: false
properties:
  input:
    type: string
  wav:
    type: string
  mods:
    type: array
    items:
      type: object
      required: [op]
      properties:
        op:
          type: string
      additionalProperties: true
  output:
    type: object
    required: [path, format]
    additionalProperties: false
    properties:
      path:
        type: string
      format:
        type: string
        enum: [json, zip, zip-no-wav]
