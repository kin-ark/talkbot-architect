  <!-- dialogue flow graph (architect) -->
  <g stroke="#ffffff" stroke-width="2.4" stroke-linecap="round">
    <line x1="15" y1="16" x2="32" y2="16"/>
    <line x1="32" y1="16" x2="23" y2="27"/>
  </g>
  <circle cx="15" cy="16" r="3.4" fill="#ffffff"/>
  <circle cx="32" cy="16" r="3.4" fill="#ffffff"/>
  <circle cx="23" cy="27" r="3.4" fill="#47bfff"/>
