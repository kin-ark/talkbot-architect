<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="tb" x1="6" y1="6" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9a5cff"/>
      <stop offset="1" stop-color="#7e14ff"/>
    </linearGradient>
  </defs>
  <!-- speech-bubble tail -->
  <path fill="url(#tb)" d="M13 33h7l-2.5 8.5z"/>
  <!-- speech bubble (talkbot) -->
