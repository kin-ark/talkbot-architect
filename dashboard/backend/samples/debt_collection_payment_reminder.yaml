name: "Debt Collection - Payment Reminder"
branch: dev
language: IDN

custom_variables:
  - name: Nama
  - name: JumlahTagihan
  - name: JatuhTempo
  - name: PtpStatus

custom_intents:
  - name: ForgotToPay
    language: IDN
    keywords: ["lupa", "lupa bayar", "belum bayar", "kelupaan"]
    user_responses: ["Saya lupa membayar", "Maaf saya lupa bayar tagihan"]
  - name: PenaltyQuestion
    language: IDN
    keywords: ["denda", "penalti", "bunga", "biaya keterlambatan"]
    user_responses: ["Apakah ada denda?", "Berapa dendanya kalau telat?"]
  - name: SpecialCircumstance
    language: IDN
    keywords: ["meninggal", "sakit", "rumah sakit", "musibah", "kena PHK"]
    user_responses: ["Orangnya sudah meninggal", "Saya sedang sakit di rumah sakit"]
  - name: HowToPay
    language: IDN
    keywords: ["cara bayar", "bagaimana membayar", "metode pembayaran", "transfer kemana"]
    user_responses: ["Bagaimana cara membayarnya?", "Saya bayar lewat mana?"]

knowledge_bases:
  - name: "KBB3 Forgot to Pay"
    intents: [ForgotToPay]
    answers: ["Tidak masalah. Anda dapat segera melakukan pembayaran melalui aplikasi atau transfer ke rekening yang tertera pada tagihan Anda."]
  - name: "KBB8 Penalty Non-Payment"
    intents: [PenaltyQuestion]
    answers: ["Keterlambatan pembayaran dapat dikenakan denda harian sesuai ketentuan. Kami sarankan segera melunasi untuk menghindari biaya tambahan."]
  - name: "KBB9 Special Circumstances"
    intents: [SpecialCircumstance]
    answers: ["Kami turut prihatin atas kondisi tersebut. Untuk penanganan lebih lanjut, kami akan menghubungkan Anda dengan petugas kami."]
  - name: "How to Pay"
    intents: [HowToPay]
    answers: ["Pembayaran dapat dilakukan melalui aplikasi, ATM, atau transfer bank ke nomor rekening yang tercantum pada tagihan Anda."]

canvases:
  - name: "0. Greeting & Confirm"
    nodes:
      - id: greet
        type: talk
        prompt: "Selamat siang, saya menghubungi atas nama perusahaan pembiayaan. Apakah benar saya berbicara dengan {Nama}?"
      - id: g_inform
        type: goto
        config: {target: "1. Inform Payment Due"}
      - id: g_wrong
        type: goto
        config: {target: "Wrong Number"}
    edges:
      - {from: greet, branch: Positive, to: g_inform}
      - {from: greet, branch: Negative, to: g_wrong}
      - {from: greet, branch: Unclassified, to: g_inform}

  - name: "Wrong Number"
    nodes:
      - id: apolo
        type: talk
        prompt: "Mohon maaf atas gangguannya. Terima kasih atas waktunya."
      - id: bye_wrong
        type: exit
        prompt: "Selamat siang."
    edges:
      - {from: apolo, branch: Unclassified, to: bye_wrong}

  - name: "1. Inform Payment Due"
    nodes:
      - id: inform
        type: talk
        prompt: "Kami ingin mengingatkan bahwa tagihan Anda sebesar {JumlahTagihan} telah jatuh tempo pada {JatuhTempo}. Apakah Anda berkenan menyelesaikannya hari ini?"
      - id: g_convince
        type: goto
        config: {target: "2. Convincer"}
      - id: g_cannot_a
        type: goto
        config: {target: "Cannot Pay"}
    edges:
      - {from: inform, branch: Positive, to: g_convince}
      - {from: inform, branch: Negative, to: g_cannot_a}
      - {from: inform, branch: Unclassified, to: g_convince}

  - name: "2. Convincer"
    nodes:
      - id: convince
        type: talk
        prompt: "Pembayaran tepat waktu membantu Anda terhindar dari denda dan menjaga skor kredit tetap baik. Apakah Anda dapat melakukan pembayaran sekarang?"
      - id: g_collect
        type: goto
        config: {target: "Collect Commitment"}
      - id: g_cannot_b
        type: goto
        config: {target: "Cannot Pay"}
    edges:
      - {from: convince, branch: Positive, to: g_collect}
      - {from: convince, branch: Negative, to: g_cannot_b}
      - {from: convince, branch: Unclassified, to: g_collect}

  - name: "Collect Commitment"
    nodes:
      - id: ask_ptp
        type: talk
        prompt: "Baik, kapan kira-kira Anda dapat melakukan pembayaran?"
      - id: set_ptp
        type: assign
        prompt: "(catat komitmen pembayaran)"
        config: {variable: PtpStatus, value: "committed"}
      - id: route_ptp
        type: conditional
        prompt: "(rute berdasarkan komitmen)"
        config:
          variable: PtpStatus
          branches:
            - {name: Committed, op: "=", value: "committed", to: g_close_pos}
            - {name: Default, to: g_close_pos}
      - id: g_close_pos
        type: goto
        config: {target: "3. Positive Closing"}
    edges:
      - {from: ask_ptp, branch: Positive, to: set_ptp}
      - {from: ask_ptp, branch: Unclassified, to: set_ptp}
      - {from: set_ptp, branch: Default, to: route_ptp}

  - name: "Cannot Pay"
    nodes:
      - id: cannot
        type: talk
        prompt: "Kami memahami situasi Anda. Boleh kami tahu kendala yang membuat pembayaran belum dapat dilakukan?"
      - id: g_collect2
        type: goto
        config: {target: "Collect Commitment"}
      - id: to_human
        type: transfer
        prompt: "Baik, kami akan menghubungkan Anda dengan petugas kami. Mohon menunggu sebentar."
      - id: g_neutral
        type: goto
        config: {target: "4. Neutral Closing"}
    edges:
      - {from: cannot, branch: Positive, to: g_collect2}
      - {from: cannot, branch: Negative, to: to_human}
      - {from: cannot, branch: Unclassified, to: g_neutral}

  - name: "3. Positive Closing"
    nodes:
      - id: close_pos
        type: talk
        prompt: "Terima kasih atas komitmennya. Mohon lakukan pembayaran sesuai kesepakatan."
      - id: end_pos
        type: exit
        prompt: "Selamat siang."
    edges:
      - {from: close_pos, branch: Unclassified, to: end_pos}

  - name: "4. Neutral Closing"
    nodes:
      - id: close_neu
        type: talk
        prompt: "Baik, terima kasih atas waktunya."
      - id: end_neu
        type: exit
        prompt: "Selamat siang."
    edges:
      - {from: close_neu, branch: Unclassified, to: end_neu}
