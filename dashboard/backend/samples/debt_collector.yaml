name: "Debt Collector"
branch: dev
language: IDN
canvases:
  - name: "1. Main"
    nodes:
      - id: greet
        type: talk
        prompt: "Hi, this is a reminder about your outstanding payment. Are you able to pay today?"
      - id: offer
        type: talk
        prompt: "No problem — let me connect you to an agent to arrange a plan."
      - id: human
        type: transfer
        prompt: "Please hold while I transfer you to an agent."
      - id: bye
        type: exit
        prompt: "Thank you. Goodbye!"
    edges:
      - {from: greet, branch: Positive, to: bye}
      - {from: greet, branch: Unclassified, to: offer}
      - {from: offer, branch: Unclassified, to: human}
