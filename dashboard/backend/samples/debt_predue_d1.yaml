name: "Debt Collection - Predue D-1"
branch: dev
language: IDN

custom_variables:
  - name: Salutation
  - name: GenderX
  - name: Nama
  - name: JumlahTagihan
  - name: JatuhTempo
  - name: PtpStatus
  - name: DateCollected

custom_intents:
  - name: AlreadyPaid
    language: IDN
    keywords: ["sudah bayar", "sudah terbayar"]
    user_responses: ["kan saya udah bayar", "kemaren siang udah dibayar", "perasaan saya udah lunas kok", "minggu lalu udah dibayar kok", "iya semalem udah saya bayar"]
  - name: BankAccountVA
    language: IDN
    keywords: ["kode", "kodenya", "rekening"]
    user_responses: ["kodenya mana", "nomor registrasinya berapa", "transfer ke mana", "rekening mana"]
  - name: HowToPay
    language: IDN
    keywords: ["gimana cara bayar", "bisa bayar pakai apa", "via apa"]
    user_responses: ["cara bayarnya gimana ya", "pembayarannya bisa melalui apa", "apa aja metode pembayarannya"]
  - name: FailedToPay
    language: IDN
    keywords: ["gagal bayar", "blokir", "block", "gangguan", "failed"]
    user_responses: ["gagal terus tadi pas bayar", "udah bayar kok tapi gagal", "setiap mau bayar gagal"]
  - name: Waive
    language: IDN
    keywords: ["pengurangan", "potongan", "diskon", "keringanan"]
    user_responses: ["saya mau minta keringanan", "boleh dibantu penghapusan bunga gak", "mau bayar tapi tanpa bunga"]
  - name: CanIPayInstallments
    language: IDN
    keywords: ["dicicil", "nyicil", "cicil", "minimal payment"]
    user_responses: ["apa bisa dicicil", "diangsur aja ya", "kalau bayarnya cuma setengahnya gimana"]
  - name: GiveMeMoreTime
    language: IDN
    keywords: ["tambah waktu", "minta waktu", "waktu tambahan"]
    user_responses: ["kasih saya waktu lebih", "dimundurin bayarnya boleh ya", "kasih saya waktu seminggu lagi"]
  - name: InterestTooHigh
    language: IDN
    keywords: ["bunganya tinggi", "bunga tinggi", "bunga"]
    user_responses: ["bunganya tinggi banget sih mbak", "biaya adminnya tinggi", "nyekik leher banget dendanya"]
  - name: ExtendedFee
    language: IDN
    keywords: ["biaya perpanjangan", "denda per hari", "biaya tambahan"]
    user_responses: ["ada biaya perpanjangan gak", "ini denda per hari atau gimana", "kok tiap hari nambah dendanya"]
  - name: DifferentAmount
    language: IDN
    keywords: ["jumlahnya beda", "nominal beda", "kok jadi lebih bayar"]
    user_responses: ["kok jadi lebih bayar", "jumlahnya kok beda", "nominalnya kok gak sama"]
  - name: WrongPerson
    language: IDN
    keywords: ["salah nomor", "salah sambung", "nyari siapa"]
    user_responses: ["orangnya tidak ada", "salah nomor", "salah sambung mbak kayaknya", "mau bicara sama siapa ya", "nyari bapak siapa"]
  - name: InPrison
    language: IDN
    keywords: ["bui", "penjara", "di tahan"]
    user_responses: ["dia lagi di penjara mbak", "dia lagi dalam proses hukum"]
  - name: Hospitalized
    language: IDN
    keywords: ["rumah sakit", "sakit", "rawat inap", "isoman", "covid", "kecelakaan"]
    user_responses: ["baru aja masuk rumah sakit", "ada keluarga yang sakit"]
  - name: StopCallingMe
    language: IDN
    keywords: ["jangan telpon", "berhenti nelpon", "keluarkan nomor saya"]
    user_responses: ["udah jangan telpon telpon lagi", "berhenti nelponin saya bisa gak", "tolong keluarkan nomor saya dari list"]
  - name: WillCallCS
    language: IDN
    keywords: ["telepon dulu", "nomor yang bisa dihubungi", "hotline"]
    user_responses: ["oke saya telepon dulu saja", "ada nomor yang bisa saya hubungi"]
  - name: WillReportPolice
    language: IDN
    keywords: ["lapor", "polisi", "adukan", "pengacara", "ylki"]
    user_responses: ["saya laporkan ke pihak berwajib loh", "saya laporin ke polisi ya"]

hot_words:
  - "Legal"
  - "OJK"
  - "call center"
  - "hotline"
  - "jatuh tempo"
  - "deadline"
  - "jatoh tempo"
  - "denda"
  - "bayar"
  - "uang"
  - "tagihan"
  - "nyicil"
  - "cicil"
  - "hutang"
  - "ngutang"
  - "utang"
  - "virtual account"
  - "va"
  - "banking"
  - "bca"
  - "brimo"
  - "brilink"
  - "alfamart"
  - "indomart"
  - "tokopedia"
