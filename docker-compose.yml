# Single-instance deploy. One container, one worker, one attached volume.
# Do NOT add replicas/scale — the backend holds a process-global active Session.
services:
  dashboard:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.deploy            # DASHBOARD_PASSWORD=... (+ optional DASHBOARD_USER, LLM_PROVIDER, LLM_MODEL, CORS_ORIGINS)
    environment:
      - LOG_DIR=/app/dashboard/backend/logs
      - BACKUP_DIR=/app/dashboard/backend/backups
      - BACKUP_INTERVAL_H=6      # 0 disables the scheduled auto-backup
      - BACKUP_KEEP=7
    volumes:
      - sessions:/app/dashboard/backend/.sessions
      - logs:/app/dashboard/backend/logs
      - backups:/app/dashboard/backend/backups        # separate from sessions
    restart: unless-stopped
    labels:
      - autoheal=true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
  # Watches for 'unhealthy' containers labelled autoheal=true and restarts them
  # (catches hangs — restart:unless-stopped only covers process exit/crash).
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  # Public HTTPS access without a domain/port-forward: Tailscale Funnel proxies
  # https://<TS_HOSTNAME>.<tailnet>.ts.net -> dashboard:8000. Userspace mode, so
  # no NET_ADMIN / /dev/net/tun needed. Requires (one-time, in the Tailscale admin
  # console): MagicDNS on, HTTPS certificates enabled, and the `funnel` nodeAttr
  # for autogroup:member. Set TS_AUTHKEY in .env.deploy (reusable, non-ephemeral).
  # The tunnel stays down until TS_AUTHKEY is present; the dashboard still serves
  # on :8000 for LAN regardless. For tailnet-private (not public), drop the
  # AllowFunnel block from tailscale-serve.json.
  tailscale:
    image: tailscale/tailscale:latest
    hostname: talkbot-architect          # -> https://talkbot-architect.<tailnet>.ts.net
    env_file:
      - .env.deploy                      # supplies TS_AUTHKEY
    environment:
      - TS_HOSTNAME=talkbot-architect
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - ts-state:/var/lib/tailscale
      - ./tailscale-serve.json:/config/serve.json:ro
    depends_on:
      - dashboard
    restart: unless-stopped
volumes:
  sessions:
  logs:
  backups:
  ts-state:
